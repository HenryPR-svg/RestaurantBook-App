<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Administrador - RestaurantBook</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f6;
        margin: 0;
        padding: 20px;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #333;
        border-bottom: 2px solid #007bff;
        padding-bottom: 10px;
      }
      .form-container {
        background: #f9f9f9;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        border: 1px solid #ddd;
      }
      input,
      select,
      button {
        padding: 10px;
        margin: 5px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        background-color: #28a745;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }
      button:hover {
        background-color: #218838;
      }
      .btn-danger {
        background-color: #dc3545;
        padding: 5px 10px;
        font-size: 12px;
      }
      .btn-danger:hover {
        background-color: #c82333;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 12px;
        text-align: left;
      }
      th {
        background-color: #007bff;
        color: white;
      }
      tr:hover {
        background-color: #f1f1f1;
      }
      .badge {
        padding: 5px 10px;
        border-radius: 20px;
        color: white;
        font-size: 12px;
      }
      .bg-success {
        background-color: #28a745;
      }
      .bg-secondary {
        background-color: #6c757d;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Panel de Control - Administrador</h1>

      <div class="form-container">
        <h3>Agregar Nuevo Usuario</h3>
        <form id="form-usuario">
          <input
            type="text"
            id="nombre"
            placeholder="Nombre completo"
            required
          />
          <input
            type="email"
            id="correo"
            placeholder="Correo electrónico"
            required
          />
          <input
            type="password"
            id="password"
            placeholder="Contraseña"
            required
          />
          <select id="rol" aria-label="Rol del usuario">
            <option value="Cliente">Cliente</option>
            <option value="Mesero">Mesero</option>
            <option value="Administrador">Administrador</option>
          </select>
          <button type="submit">Guardar Usuario</button>
        </form>
      </div>

      <h2>Lista de Usuarios Registrados</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Rol</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-usuarios"></tbody>
      </table>
    </div>

    <script>
      const apiUrl = "http://localhost:3000/api/admin/usuarios";

      // 1. Cargar Usuarios (GET)
      function cargarUsuarios() {
        fetch(apiUrl)
          .then((res) => res.json())
          .then((usuarios) => {
            const tabla = document.getElementById("tabla-usuarios");
            tabla.innerHTML = ""; // Limpiar antes de cargar

            usuarios.forEach((user) => {
              let estadoColor =
                user.estado === "Activo" ? "bg-success" : "bg-secondary";
              tabla.innerHTML += `<tr>
                            <td>${user.id_usuario}</td>
                            <td><strong>${user.nombre}</strong></td>
                            <td>${user.correo}</td>
                            <td>${user.rol}</td>
                            <td><span class="badge ${estadoColor}">${user.estado}</span></td>
                            <td><button class="btn-danger" onclick="eliminarUsuario(${user.id_usuario})">Eliminar</button></td>
                        </tr>`;
            });
          })
          .catch((err) => console.error("Error al cargar:", err));
      }

      // 2. Crear Usuario (POST)
      document
        .getElementById("form-usuario")
        .addEventListener("submit", function (e) {
          e.preventDefault(); // Evita que la página se recargue

          const nuevoUsuario = {
            nombre: document.getElementById("nombre").value,
            correo: document.getElementById("correo").value,
            password: document.getElementById("password").value,
            rol: document.getElementById("rol").value,
          };

          fetch(apiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(nuevoUsuario),
          })
            .then((res) => res.json())
            .then((data) => {
              alert(data.mensaje); // Mostrar mensaje de éxito
              document.getElementById("form-usuario").reset(); // Limpiar formulario
              cargarUsuarios(); // Recargar la tabla
            })
            .catch((err) =>
              alert("Error al crear usuario. Revisa si el correo ya existe."),
            );
        });

      // 3. Eliminar Usuario (DELETE)
      function eliminarUsuario(id) {
        if (confirm("¿Estás seguro de eliminar este usuario?")) {
          fetch(`${apiUrl}/${id}`, { method: "DELETE" })
            .then((res) => res.json())
            .then((data) => {
              alert(data.mensaje);
              cargarUsuarios(); // Recargar la tabla
            })
            .catch((err) => console.error("Error al eliminar:", err));
        }
      }

      // Cargar datos al abrir la página
      cargarUsuarios();
    </script>
  </body>
</html>
