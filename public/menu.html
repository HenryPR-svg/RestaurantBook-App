```html
<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RestaurantBook - Menú Digital</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#111827;
color:white;
min-height:100vh;
}

header{
background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1200');

background-size:cover;
background-position:center;

height:300px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;
}

header h1{
font-size:3rem;
margin-bottom:10px;
}

header p{
font-size:1.2rem;
color:#e5e7eb;
}

.filtros{
padding:30px;
text-align:center;
}

.filtros button{

padding:12px 22px;
margin:6px;

border:none;
border-radius:30px;

background:#f59e0b;
color:white;

font-weight:bold;
cursor:pointer;

transition:.3s;
}

.filtros button:hover{

transform:translateY(-2px);
background:#d97706;

}

.contenedor-menu{

max-width:1300px;
margin:auto;

padding:30px;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));

gap:25px;

}

.card{

background:#1f2937;

border-radius:18px;

overflow:hidden;

box-shadow:
0 10px 25px rgba(0,0,0,.35);

transition:.3s;

}

.card:hover{

transform:translateY(-8px);

}

.card img{

width:100%;
height:220px;

object-fit:cover;

}

.card-body{

padding:18px;

}

.card-body h3{

color:white;
margin-bottom:10px;

}

.card-body p{

color:#d1d5db;
margin-bottom:10px;

}

.precio{

font-size:1.5rem;
font-weight:bold;

color:#fbbf24;

margin-bottom:10px;

}

.categoria{

display:inline-block;

padding:7px 12px;

border-radius:20px;

background:#2563eb;

font-size:.8rem;

color:white;

}

</style>

</head>

<body>

<header>

<h1>RestaurantBook</h1>

<p>Menú Digital del Restaurante</p>

</header>

<section class="filtros">

<button onclick="filtrar('Todos')">Todos</button>

<button onclick="filtrar('Entradas')">Entradas</button>

<button onclick="filtrar('Platos Fuertes')">Platos Fuertes</button>

<button onclick="filtrar('Bebidas')">Bebidas</button>

<button onclick="filtrar('Postres')">Postres</button>

</section>

<div class="contenedor-menu" id="contenedorMenu"></div>

<script>

let platos = [];

const imagenes = {

"Nachos Supremos":
"https://images.unsplash.com/photo-1513456852971-30c0b8199d4d?w=800",

"Alitas BBQ":
"https://images.unsplash.com/photo-1527477396000-e27163b481c2?w=800",

"Hamburguesa Especial":
"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800",

"Pizza Familiar":
"https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800",

"Coca Cola":
"https://images.unsplash.com/photo-1629203851122-3726ecdf080e?w=800",

"Limonada Natural":
"https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=800",

"Cheesecake":
"https://images.unsplash.com/photo-1533134242443-d4fd215305ad?w=800",

"Brownie":
"https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=800"

};

async function cargarMenu(){

try{

const respuesta = await fetch("/api/menu");

platos = await respuesta.json();

mostrarMenu(platos);

}catch(error){

console.error(error);

}

}

function mostrarMenu(datos){

const contenedor =
document.getElementById("contenedorMenu");

contenedor.innerHTML = "";

datos.forEach(plato=>{

contenedor.innerHTML += `

<div class="card">

<img src="${imagenes[plato.nombre_plato]}" alt="${plato.nombre_plato}">

<div class="card-body">

<h3>${plato.nombre_plato}</h3>

<p>${plato.descripcion}</p>

<p class="precio">$${plato.precio}</p>

<span class="categoria">${plato.categoria}</span>

</div>

</div>

`;

});

}

function filtrar(categoria){

if(categoria==="Todos"){

mostrarMenu(platos);

return;

}

const filtrados = platos.filter(

plato => plato.categoria === categoria

);

mostrarMenu(filtrados);

}

cargarMenu();

</script>

</body>
</html>
